<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Eclipsi AR 2026 · 12 d'agost</title>
<meta name="description" content="Compte enrere, circumstàncies locals i realitat augmentada per a l'eclipsi solar total del 12 d'agost de 2026. Calculat en viu des dels elements besselians de la NASA.">
<meta name="theme-color" content="#05060d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eclipse AR">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="starfield"></div>
<canvas id="stars"></canvas>

<div class="wrap">

  <!-- ══════════════ SELECTOR D'IDIOMA ══════════════ -->
  <div class="langbar" role="group" aria-label="Idioma">
    <button class="lang-btn" data-lang="ca" title="Català" aria-label="Català">
      <svg viewBox="0 0 27 18" aria-hidden="true">
        <rect width="27" height="18" fill="#FCDD09"/>
        <g fill="#DA121A">
          <rect y="2" width="27" height="2"/><rect y="6" width="27" height="2"/>
          <rect y="10" width="27" height="2"/><rect y="14" width="27" height="2"/>
        </g>
      </svg>
    </button>
    <button class="lang-btn" data-lang="es" title="Castellano" aria-label="Castellano">
      <svg viewBox="0 0 30 20" aria-hidden="true">
        <rect width="30" height="20" fill="#AA151B"/>
        <rect y="5" width="30" height="10" fill="#F1BF00"/>
      </svg>
    </button>
    <button class="lang-btn" data-lang="en" title="English" aria-label="English">
      <svg viewBox="0 0 60 30" aria-hidden="true">
        <clipPath id="ukclip"><rect width="60" height="30"/></clipPath>
        <g clip-path="url(#ukclip)">
          <rect width="60" height="30" fill="#012169"/>
          <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
          <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="3.5"/>
          <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/>
          <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>
        </g>
      </svg>
    </button>
    <button class="lang-btn" data-lang="fr" title="Français" aria-label="Français">
      <svg viewBox="0 0 30 20" aria-hidden="true">
        <rect width="10" height="20" fill="#002395"/>
        <rect x="10" width="10" height="20" fill="#fff"/>
        <rect x="20" width="10" height="20" fill="#ED2939"/>
      </svg>
    </button>
    <button class="lang-btn" data-lang="de" title="Deutsch" aria-label="Deutsch">
      <svg viewBox="0 0 30 18" aria-hidden="true">
        <rect width="30" height="6" fill="#000"/>
        <rect y="6" width="30" height="6" fill="#DD0000"/>
        <rect y="12" width="30" height="6" fill="#FFCE00"/>
      </svg>
    </button>
  </div>

  <!-- ══════════════ CAPÇALERA ══════════════ -->
  <header class="hero">
    <div class="kicker" data-i18n="app.kicker"></div>
    <h1 data-i18n="app.title"></h1>
    <p class="subtitle" data-i18n="app.subtitle"></p>
  </header>

  <!-- ══════════════ COMPTE ENRERE ══════════════ -->
  <section class="card">
    <div class="countdown-label" id="cdLabel"></div>
    <div class="countdown" id="countdown">
      <div class="cd-unit"><div class="cd-num" id="cdD">—</div><div class="cd-lab" data-i18n="cd.days"></div></div>
      <div class="cd-unit"><div class="cd-num" id="cdH">—</div><div class="cd-lab" data-i18n="cd.hours"></div></div>
      <div class="cd-unit"><div class="cd-num" id="cdM">—</div><div class="cd-lab" data-i18n="cd.min"></div></div>
      <div class="cd-unit"><div class="cd-num" id="cdS">—</div><div class="cd-lab" data-i18n="cd.sec"></div></div>
    </div>

    <div class="progress-shell">
      <div class="progress-track">
        <div class="progress-fill" id="progFill"></div>
        <div class="progress-totality hidden" id="progTot"></div>
      </div>
      <div class="progress-marks" id="progMarks"></div>
    </div>
  </section>

  <!-- ══════════════ UBICACIÓ ══════════════ -->
  <div class="locbar">
    <button class="chip accent" id="btnGeo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-6.2-7-11a7 7 0 1114 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
      <span id="geoLabel" data-i18n="app.geo"></span>
    </button>
    <span class="chip" id="locChip"></span>
  </div>

  <!-- ══════════════ AVISOS ══════════════ -->
  <div id="alerts"></div>

  <!-- ══════════════ FASES ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.phases"></span></h2>
    <div class="phases" id="phases"></div>
    <div class="muted" style="margin-top:12px" data-i18n="phases.note"></div>
  </section>

  <!-- ══════════════ SIMULACIÓ ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.sim"></span></h2>
    <div class="sim-wrap">
      <canvas id="simCanvas" width="640" height="640"></canvas>
      <div class="sim-readout">
        <div class="ro"><div class="ro-v" id="roMag">—</div><div class="ro-l" data-i18n="ro.mag"></div></div>
        <div class="ro"><div class="ro-v" id="roObs">—</div><div class="ro-l" data-i18n="ro.obs"></div></div>
        <div class="ro"><div class="ro-v" id="roPhase">—</div><div class="ro-l" data-i18n="ro.phase"></div></div>
      </div>
      <div class="scrub">
        <div class="scrub-row">
          <span data-i18n="scrub.explore"></span>
          <b id="scrubTime" data-i18n="scrub.live"></b>
        </div>
        <input type="range" id="scrub" min="-100" max="100" value="0" step="0.1">
        <div class="scrub-row" style="margin:6px 0 0">
          <span class="muted" data-i18n="scrub.drag"></span>
          <button class="city-btn" id="scrubReset" data-i18n="scrub.back"></button>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════════════ POSICIÓ DEL SOL ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.sun"></span></h2>
    <div class="sunpos">
      <canvas id="compass" width="320" height="320"></canvas>
      <div class="sunpos-data">
        <div class="spd"><span class="spd-l" data-i18n="sun.az"></span><span class="spd-v" id="sunAz">—</span></div>
        <div class="spd"><span class="spd-l" data-i18n="sun.alt"></span><span class="spd-v" id="sunAlt">—</span></div>
        <div class="spd"><span class="spd-l" data-i18n="sun.dir"></span><span class="spd-v" id="sunDir">—</span></div>
        <div class="spd"><span class="spd-l" data-i18n="sun.set"></span><span class="spd-v" id="sunSet">—</span></div>
      </div>
    </div>
    <div class="muted" style="margin-top:12px" data-i18n="sun.note"></div>
  </section>

  <!-- ══════════════ DADES LOCALS ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.local"></span></h2>
    <div class="grid2" id="stats"></div>
  </section>

  <!-- ══════════════ MAPA ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.band"></span></h2>
    <div id="map"></div>
    <div class="map-legend">
      <span><i style="background:#ffab3d"></i><span data-i18n="legend.center"></span></span>
      <span><i style="background:rgba(255,171,61,.5)"></i><span data-i18n="legend.band"></span></span>
      <span><i style="background:#4fd6ff"></i><span data-i18n="legend.you"></span></span>
    </div>
    <div class="muted" id="mapNote" style="margin-top:10px"></div>
  </section>

  <!-- ══════════════ CIUTATS ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.cities"></span></h2>
    <div class="cities" id="cities"></div>
    <div class="muted" style="margin-top:12px" data-i18n="cities.note"></div>
  </section>

  <!-- ══════════════ SEGURETAT ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.safety"></span></h2>
    <div class="alert danger">
      <span class="alert-ico">⛔</span><div data-i18n="safety.1"></div>
    </div>
    <div class="alert ok">
      <span class="alert-ico">👁️</span><div data-i18n="safety.2"></div>
    </div>
    <div class="alert info">
      <span class="alert-ico">📷</span><div data-i18n="safety.3"></div>
    </div>
    <div class="alert warn">
      <span class="alert-ico">🏔️</span><div data-i18n="safety.4"></div>
    </div>
  </section>

  <!-- ══════════════ EINES ══════════════ -->
  <section class="card">
    <h2><span class="dot"></span><span data-i18n="card.tools"></span></h2>
    <div class="cities">
      <button class="city-btn" id="btnICS" data-i18n="tools.ics"></button>
      <button class="city-btn" id="btnNotify" data-i18n="tools.notify"></button>
      <button class="city-btn" id="btnShare" data-i18n="tools.share"></button>
      <button class="city-btn" id="btnInstall" data-i18n="tools.install"></button>
    </div>
  </section>

  <footer>
    <p class="muted" data-i18n="footer"></p>
  </footer>
</div>

<!-- ══════════════ BOTONERA FLOTANT ══════════════ -->
<div class="dock">
  <button class="btn btn-ar" id="btnAR">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M3 8V5a2 2 0 012-2h3M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3M21 16v3a2 2 0 01-2 2h-3"/>
      <circle cx="12" cy="12" r="3.2"/>
    </svg>
    <span data-i18n="dock.ar"></span>
  </button>
  <button class="btn btn-ghost" id="btnTop" title="↑">↑</button>
</div>

<!-- ══════════════ VISTA AR ══════════════ -->
<div id="arView">
  <video id="arVideo" playsinline muted autoplay></video>
  <canvas id="arCanvas"></canvas>
  <div class="ar-ui">
    <div class="ar-top">
      <div class="ar-pill" id="arInfo" data-i18n="ar.starting"></div>
      <button class="ar-close" id="arClose">✕</button>
    </div>
    <div class="ar-bottom">
      <div class="ar-hint" id="arHint" data-i18n="ar.hintDefault"></div>
      <div class="ar-controls">
        <button class="ar-btn on" id="arTrack" data-i18n="ar.track"></button>
        <button class="ar-btn on" id="arDisk" data-i18n="ar.disk"></button>
        <button class="ar-btn" id="arCal" data-i18n="ar.cal"></button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/i18n.js"></script>
<script src="js/astro.js"></script>
<script src="js/eclipse.js"></script>
<script src="js/ar.js"></script>
<script src="js/app.js"></script>
</body>
</html>
